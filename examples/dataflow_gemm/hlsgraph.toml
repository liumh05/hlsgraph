schema_version = "0.3.0"
project_id = "examples.dataflow_gemm"
name = "Dataflow GEMM-style pipeline"

[build]
top = "dut"
language = "c++"
flow_target = "vitis"
compile_commands = "compile_commands.json"
include_dirs = ["include"]
config_files = []
tcl_files = ["directives.tcl"]
testbench_files = ["tb.cpp"]
golden_files = []

[[build.translation_units]]
file = "kernel.cpp"
directory = "."
arguments = ["-std=c++17", "-Iinclude"]

[target]
vendor = "amd"
part = "xck26-sfvc784-2LV-c"
capacities = { lut = 117000, ff = 234000, dsp = 1248, bram_18k = 288, uram = 64 }
reserved_resources = { lut = 1000, ff = 2000 }

[[target.clocks]]
name = "ap_clk"
period_ns = 5.0
uncertainty_ns = 0.5

[constraints]
resources = { lut = 116000, ff = 232000, dsp = 1248, bram_18k = 288, uram = 64 }
xdc_files = []
numerical = { type = "integer", exact = true }

[[toolchains]]
id = "amd.vitis.2024_2"
vendor = "amd"
name = "vitis_hls"
version = "2024.2"
build = "synthetic-fixture"

[[toolchains]]
id = "amd.vivado.2024_2"
vendor = "amd"
name = "vivado"
version = "2024.2"
build = "synthetic-fixture"

[[artifact_paths]]
path = "kernel.cpp"
kind = "source.cpp"
role = "design_source"
access = "private"
license = "Apache-2.0"

